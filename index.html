            <h1 class="intro-title"><span id="changer">hey!</span>
                i'm parker jackson</h1>
            
                <script>    var words = ["hello!", "hi!", "hey!"];
                    var i = 0;
                    var text = "This text changes";
                    function _getChangedText() {
                      i = (i + 1) % words.length;
                      return text.replace(/This text changes/, words[i]);
                    }
                    function _changeText() {
                      var txt = _getChangedText();
                      document.getElementById("changer").innerHTML = txt;
                    }
                    setInterval("_changeText()", 2000);</script>
